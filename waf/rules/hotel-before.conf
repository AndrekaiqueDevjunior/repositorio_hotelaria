# IDs locais reservados: 100000-100999.

# Arquivos e paineis frequentemente procurados por scanners automatizados.
SecRule REQUEST_URI_RAW "@rx (?:^|/)(?:\.env(?:$|[/.])|\.git(?:$|/)|\.aws(?:$|/)|wp-admin(?:$|/)|wp-login\.php(?:$|/)|phpmyadmin(?:$|/)|vendor/phpunit(?:$|/)|server-status(?:$|/)|actuator(?:$|/))" \
    "id:100001,phase:1,deny,status:403,log,auditlog,t:none,t:urlDecodeUni,t:lowercase,msg:'HOTEL-WAF: caminho sensivel ou scanner'"

# Defesa explicita para traversal; o CRS continua cobrindo variantes gerais.
SecRule REQUEST_URI_RAW "@rx (?:\.\./|%2e%2e(?:%2f|/)|%252e%252e)" \
    "id:100002,phase:1,deny,status:403,log,auditlog,t:none,t:lowercase,msg:'HOTEL-WAF: tentativa de path traversal'"

# Base64 e dado opaco, validado e salvo como arquivo pelo backend. A exclusao
# vale somente para esse campo e para as duas rotas de comprovante; tamanho,
# JSON, protocolo, autenticacao e todos os demais campos continuam inspecionados.
SecRule REQUEST_URI "@rx ^/api/v1/(?:comprovantes/upload|reservas/[0-9]+/comprovante)$" \
    "id:100010,phase:1,pass,nolog,t:none,ctl:ruleRemoveTargetByTag=attack-sqli;ARGS:arquivo_base64,ctl:ruleRemoveTargetByTag=attack-sqli;ARGS:json.arquivo_base64,ctl:ruleRemoveTargetByTag=attack-xss;ARGS:arquivo_base64,ctl:ruleRemoveTargetByTag=attack-xss;ARGS:json.arquivo_base64,ctl:ruleRemoveTargetByTag=attack-rce;ARGS:arquivo_base64,ctl:ruleRemoveTargetByTag=attack-rce;ARGS:json.arquivo_base64,ctl:ruleRemoveTargetByTag=attack-lfi;ARGS:arquivo_base64,ctl:ruleRemoveTargetByTag=attack-lfi;ARGS:json.arquivo_base64,ctl:ruleRemoveTargetByTag=attack-rfi;ARGS:arquivo_base64,ctl:ruleRemoveTargetByTag=attack-rfi;ARGS:json.arquivo_base64"

# Senhas podem conter livremente simbolos parecidos com SQL/HTML e nunca devem
# aparecer como match no audit log. A exclusao nao afeta email, CPF ou headers.
SecRule REQUEST_URI "@rx ^/api/v1/(?:login|change-password)$" \
    "id:100011,phase:1,pass,nolog,t:none,ctl:ruleRemoveTargetByTag=attack-sqli;ARGS:password,ctl:ruleRemoveTargetByTag=attack-sqli;ARGS:json.password,ctl:ruleRemoveTargetByTag=attack-xss;ARGS:password,ctl:ruleRemoveTargetByTag=attack-xss;ARGS:json.password,ctl:ruleRemoveTargetByTag=attack-rce;ARGS:password,ctl:ruleRemoveTargetByTag=attack-rce;ARGS:json.password,ctl:ruleRemoveTargetByTag=attack-sqli;ARGS:current_password,ctl:ruleRemoveTargetByTag=attack-sqli;ARGS:json.current_password,ctl:ruleRemoveTargetByTag=attack-xss;ARGS:current_password,ctl:ruleRemoveTargetByTag=attack-xss;ARGS:json.current_password,ctl:ruleRemoveTargetByTag=attack-rce;ARGS:current_password,ctl:ruleRemoveTargetByTag=attack-rce;ARGS:json.current_password,ctl:ruleRemoveTargetByTag=attack-sqli;ARGS:new_password,ctl:ruleRemoveTargetByTag=attack-sqli;ARGS:json.new_password,ctl:ruleRemoveTargetByTag=attack-xss;ARGS:new_password,ctl:ruleRemoveTargetByTag=attack-xss;ARGS:json.new_password,ctl:ruleRemoveTargetByTag=attack-rce;ARGS:new_password,ctl:ruleRemoveTargetByTag=attack-rce;ARGS:json.new_password"

# A API TEF usa session_id no corpo JSON e nao depende de Referer. A regra
# 943120 e voltada a sessao web; removemos somente essa regra e somente no TEF.
SecRule REQUEST_URI "@beginsWith /api/v1/pagamentos/tef/" \
    "id:100012,phase:1,pass,nolog,t:none,ctl:ruleRemoveById=943120"
