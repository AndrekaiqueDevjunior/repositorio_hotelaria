# ============================================================
# DOCKER COMPOSE - PRODUÇÃO HOTEL CABO FRIO
# ============================================================
# Uso: docker-compose -f docker-compose.production.yml --env-file .env.production up -d
# ============================================================

version: '3.8'

x-production-env: &production_env
  env_file:
    - ./.env.production

services:
  # ============================================================
  # POSTGRESQL - BANCO DE DADOS PRODUÃ‡ÃƒO
  # ============================================================
  postgres:
    <<: *production_env
    image: postgres:16-alpine
    container_name: hotel_postgres_prod
    restart: unless-stopped
    command: postgres -c max_connections=200
    environment:
      POSTGRES_DB: hotel_cabo_frio_prod
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ./backup:/backup
    networks:
      - hotel_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================
  # REDIS - CACHE E SESSÃ•ES
  # ============================================================
  redis:
    <<: *production_env
    image: redis:7-alpine
    container_name: hotel_redis_prod
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data_prod:/data
    networks:
      - hotel_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ============================================================
  # NGINX PROXY (COMO NO DEV) - ACESSO VIA :8080
  # ============================================================
  nginx-proxy:
    <<: *production_env
    image: nginx:alpine
    container_name: hotel_nginx_proxy_prod
    restart: unless-stopped
    volumes:
      - ./nginx-proxy.conf:/etc/nginx/conf.d/default.conf:ro
      - ${SSL_CERT_PATH:-./ssl/fullchain.pem}:/etc/nginx/ssl/fullchain.pem:ro
      - ${SSL_KEY_PATH:-./ssl/privkey.pem}:/etc/nginx/ssl/privkey.pem:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend
    networks:
      - hotel_network

  # ============================================================
  # BACKEND - FASTAPI PRODUÃ‡ÃƒO
  # ============================================================
  backend:
    <<: *production_env
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hotel_backend_prod
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PRISMA_CONNECTION_LIMIT: ${PRISMA_CONNECTION_LIMIT:-5}
      PRISMA_POOL_TIMEOUT_SECONDS: ${PRISMA_POOL_TIMEOUT_SECONDS:-10}
      PRISMA_CONNECT_TIMEOUT_SECONDS: ${PRISMA_CONNECT_TIMEOUT_SECONDS:-5}
      PRISMA_DISCONNECT_TIMEOUT_SECONDS: ${PRISMA_DISCONNECT_TIMEOUT_SECONDS:-5}
      PRISMA_APPLICATION_NAME: hotel_backend
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      ALGORITHM: ${ALGORITHM}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      AUTH_PASSWORD: ${AUTH_PASSWORD}
      CORS_ORIGINS: ${CORS_ORIGINS}
      FRONTEND_URL: ${FRONTEND_URL}
      COOKIE_NAME: ${COOKIE_NAME}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      COOKIE_SECURE: ${COOKIE_SECURE}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE}
      COOKIE_HTTPONLY: ${COOKIE_HTTPONLY}
      COOKIE_MAX_AGE: ${COOKIE_MAX_AGE}
      APP_ENV: ${APP_ENV}
      ENVIRONMENT: ${ENVIRONMENT}
      API_V1_PREFIX: ${API_V1_PREFIX}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL}
      OTP_HASH_SECRET: ${OTP_HASH_SECRET}
      RECAPTCHA_SECRET_KEY: ${RECAPTCHA_SECRET_KEY}
      RECAPTCHA_MIN_SCORE: ${RECAPTCHA_MIN_SCORE}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY}
      CIELO_MERCHANT_ID: ${CIELO_MERCHANT_ID}
      CIELO_MERCHANT_KEY: ${CIELO_MERCHANT_KEY}
      CIELO_MODE: ${CIELO_MODE}
      CIELO_API_URL: ${CIELO_API_URL}
      CIELO_TIMEOUT_MS: ${CIELO_TIMEOUT_MS}
      ANTIFRAUDE_RISK_THRESHOLD_AUTO: ${ANTIFRAUDE_RISK_THRESHOLD_AUTO}
      ANTIFRAUDE_RISK_THRESHOLD_REJECT: ${ANTIFRAUDE_RISK_THRESHOLD_REJECT}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL}
      SENDGRID_FROM_NAME: ${SENDGRID_FROM_NAME}
      SENDGRID_RESERVAS_TO_EMAIL: ${SENDGRID_RESERVAS_TO_EMAIL}
      SMS_TWILIO_ACCOUNT_SID: ${SMS_TWILIO_ACCOUNT_SID}
      SMS_TWILIO_AUTH_TOKEN: ${SMS_TWILIO_AUTH_TOKEN}
      SMS_TWILIO_FROM_NUMBER: ${SMS_TWILIO_FROM_NUMBER}
      TWILIO_WHATSAPP_ENABLED: ${TWILIO_WHATSAPP_ENABLED}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_WHATSAPP_FROM: ${TWILIO_WHATSAPP_FROM}
      TWILIO_WHATSAPP_SANDBOX_JOIN_CODE: ${TWILIO_WHATSAPP_SANDBOX_JOIN_CODE}
      WHATSAPP_NOTIFICACAO_NUMERO: ${WHATSAPP_NOTIFICACAO_NUMERO}
      TEF_AGENTE_URL: ${TEF_AGENTE_URL}
      TEF_AGENTE_MODE: ${TEF_AGENTE_MODE}
      TEF_AGENTE_VERIFY_SSL: ${TEF_AGENTE_VERIFY_SSL}
      TEF_TIMEOUT: ${TEF_TIMEOUT}
      TEF_SESSION_TIMEOUT: ${TEF_SESSION_TIMEOUT}
      TEF_TIMEZONE: ${TEF_TIMEZONE}
      TEF_SITEF_IP: ${TEF_SITEF_IP}
      TEF_STORE_ID: ${TEF_STORE_ID}
      TEF_TERMINAL_ID: ${TEF_TERMINAL_ID}
      TEF_CASHIER_OPERATOR: ${TEF_CASHIER_OPERATOR}
      TEF_SESSION_PARAMETERS: ${TEF_SESSION_PARAMETERS}
      TEF_TRN_INIT_PARAMETERS: ${TEF_TRN_INIT_PARAMETERS}
      TEF_TRN_PARAMETERS: ${TEF_TRN_PARAMETERS}
      TEF_PARMSCLIENT_PREFIX: ${TEF_PARMSCLIENT_PREFIX}
      TEF_CNPJ_ESTAB: ${TEF_CNPJ_ESTAB}
      TEF_CNPJ_AUTOMACAO: ${TEF_CNPJ_AUTOMACAO}
      TEF_PARAMETROS_ADICIONAIS: ${TEF_PARAMETROS_ADICIONAIS}
      TEF_SUPERVISOR_PASSWORD: ${TEF_SUPERVISOR_PASSWORD}
      TEF_AUTO_RESOLVE_PENDING: ${TEF_AUTO_RESOLVE_PENDING:-true}
      TEF_AUTO_RESOLVE_PENDING_ACTION: ${TEF_AUTO_RESOLVE_PENDING_ACTION:-confirm}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - backend_cache_prod:/app/.cache
      - ./uploads:/app/uploads
      - ./media:/app/media
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hotel_network
    command: >
      sh -c "
        echo '[BACKEND] Ambiente: $ENVIRONMENT' &&
        if [ -n \"$$ADMIN_PASSWORD\" ]; then echo '[BACKEND] ADMIN_PASSWORD detectado'; else echo '[BACKEND] ADMIN_PASSWORD ausente'; fi &&
        echo '[BACKEND] Gerando Prisma Client...' &&
        prisma generate &&
        echo '[BACKEND] Aplicando migrations (deploy)...' &&
        prisma migrate deploy &&
        echo '[BACKEND] Aplicando migrations SQL idempotentes (001-020)...' &&
        for f in $$(ls migrations/*.sql | sort -V); do echo \"[BACKEND] -> $$f\" && psql \"$$DATABASE_URL\" -f \"$$f\" || exit 1; done &&
        echo '[BACKEND] Iniciando servidor produÃ§Ã£o com Gunicorn...' &&
        gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker -b 0.0.0.0:8000 --timeout 120 --keep-alive 5 --access-logfile - --error-logfile -
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ============================================================
  # FRONTEND - NEXT.JS PRODUÃ‡ÃƒO
  # ============================================================
  frontend:
    <<: *production_env
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hotel_frontend_prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      NEXT_PUBLIC_APP_NAME: Hotel Real Cabo Frio
      NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ${NEXT_PUBLIC_RECAPTCHA_SITE_KEY}
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY}
      NEXT_PUBLIC_TEF_TLS_TOKEN: ${NEXT_PUBLIC_TEF_TLS_TOKEN}
      NEXT_PUBLIC_TEF_IDLE_TIMEOUT_MS: ${NEXT_PUBLIC_TEF_IDLE_TIMEOUT_MS}
      NEXT_PUBLIC_TEF_REQUEST_TIMEOUT_MS: ${NEXT_PUBLIC_TEF_REQUEST_TIMEOUT_MS}
      BACKEND_URL: http://backend:8000
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    expose:
      - "3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - hotel_network
    command: >
      sh -c "
        echo '[FRONTEND] Building production...' &&
        npm run build &&
        echo '[FRONTEND] Starting production server...' &&
        npm start
      "
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # ============================================================
  # CELERY WORKER - TAREFAS BACKGROUND
  # ============================================================
  celery_worker:
    <<: *production_env
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hotel_celery_prod
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PRISMA_CONNECTION_LIMIT: ${CELERY_PRISMA_CONNECTION_LIMIT:-1}
      CELERY_PRISMA_CONNECTION_LIMIT: ${CELERY_PRISMA_CONNECTION_LIMIT:-1}
      PRISMA_POOL_TIMEOUT_SECONDS: ${PRISMA_POOL_TIMEOUT_SECONDS:-10}
      PRISMA_CONNECT_TIMEOUT_SECONDS: ${PRISMA_CONNECT_TIMEOUT_SECONDS:-5}
      PRISMA_DISCONNECT_TIMEOUT_SECONDS: ${PRISMA_DISCONNECT_TIMEOUT_SECONDS:-5}
      PRISMA_APPLICATION_NAME: hotel_celery
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      AUTH_PASSWORD: ${AUTH_PASSWORD}
      CORS_ORIGINS: ${CORS_ORIGINS}
      FRONTEND_URL: ${FRONTEND_URL}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL}
      CIELO_MERCHANT_ID: ${CIELO_MERCHANT_ID}
      CIELO_MERCHANT_KEY: ${CIELO_MERCHANT_KEY}
      CIELO_MODE: ${CIELO_MODE}
      CIELO_API_URL: ${CIELO_API_URL}
      ENVIRONMENT: ${ENVIRONMENT}
      TWILIO_WHATSAPP_ENABLED: ${TWILIO_WHATSAPP_ENABLED}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_WHATSAPP_FROM: ${TWILIO_WHATSAPP_FROM}
      TWILIO_WHATSAPP_SANDBOX_JOIN_CODE: ${TWILIO_WHATSAPP_SANDBOX_JOIN_CODE}
      WHATSAPP_NOTIFICACAO_NUMERO: ${WHATSAPP_NOTIFICACAO_NUMERO}
      SMS_TWILIO_ACCOUNT_SID: ${SMS_TWILIO_ACCOUNT_SID}
      SMS_TWILIO_AUTH_TOKEN: ${SMS_TWILIO_AUTH_TOKEN}
      SMS_TWILIO_FROM_NUMBER: ${SMS_TWILIO_FROM_NUMBER}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL}
      SENDGRID_FROM_NAME: ${SENDGRID_FROM_NAME}
      SENDGRID_RESERVAS_TO_EMAIL: ${SENDGRID_RESERVAS_TO_EMAIL}
    volumes:
      - backend_cache_prod:/app/.cache
      - ./uploads:/app/uploads
      - ./media:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hotel_network
    command: >
      sh -c "
        echo '[CELERY] Gerando Prisma Client...' &&
        prisma generate &&
        echo '[CELERY] Iniciando worker...' &&
        celery -A app.core.celery_app worker --loglevel=info --concurrency=4 --max-tasks-per-child=1000
      "
    healthcheck:
      disable: true
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # ============================================================
  # CELERY BEAT - AGENDADOR DE TAREFAS PERIODICAS
  # ============================================================
  celery_beat:
    <<: *production_env
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hotel_celery_beat_prod
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PRISMA_CONNECTION_LIMIT: ${CELERY_PRISMA_CONNECTION_LIMIT:-1}
      CELERY_PRISMA_CONNECTION_LIMIT: ${CELERY_PRISMA_CONNECTION_LIMIT:-1}
      PRISMA_POOL_TIMEOUT_SECONDS: ${PRISMA_POOL_TIMEOUT_SECONDS:-10}
      PRISMA_CONNECT_TIMEOUT_SECONDS: ${PRISMA_CONNECT_TIMEOUT_SECONDS:-5}
      PRISMA_DISCONNECT_TIMEOUT_SECONDS: ${PRISMA_DISCONNECT_TIMEOUT_SECONDS:-5}
      PRISMA_APPLICATION_NAME: hotel_celery_beat
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      AUTH_PASSWORD: ${AUTH_PASSWORD}
      CORS_ORIGINS: ${CORS_ORIGINS}
      FRONTEND_URL: ${FRONTEND_URL}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL}
      CIELO_MERCHANT_ID: ${CIELO_MERCHANT_ID}
      CIELO_MERCHANT_KEY: ${CIELO_MERCHANT_KEY}
      CIELO_MODE: ${CIELO_MODE}
      CIELO_API_URL: ${CIELO_API_URL}
      ENVIRONMENT: ${ENVIRONMENT}
      TWILIO_WHATSAPP_ENABLED: ${TWILIO_WHATSAPP_ENABLED}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_WHATSAPP_FROM: ${TWILIO_WHATSAPP_FROM}
      TWILIO_WHATSAPP_SANDBOX_JOIN_CODE: ${TWILIO_WHATSAPP_SANDBOX_JOIN_CODE}
      WHATSAPP_NOTIFICACAO_NUMERO: ${WHATSAPP_NOTIFICACAO_NUMERO}
      SMS_TWILIO_ACCOUNT_SID: ${SMS_TWILIO_ACCOUNT_SID}
      SMS_TWILIO_AUTH_TOKEN: ${SMS_TWILIO_AUTH_TOKEN}
      SMS_TWILIO_FROM_NUMBER: ${SMS_TWILIO_FROM_NUMBER}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL}
      SENDGRID_FROM_NAME: ${SENDGRID_FROM_NAME}
      SENDGRID_RESERVAS_TO_EMAIL: ${SENDGRID_RESERVAS_TO_EMAIL}
    volumes:
      - backend_cache_prod:/app/.cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hotel_network
    command: >
      sh -c "
        echo '[CELERY BEAT] Gerando Prisma Client...' &&
        prisma generate &&
        echo '[CELERY BEAT] Iniciando scheduler...' &&
        celery -A app.core.celery_app beat --loglevel=info
      "
    healthcheck:
      disable: true
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # ============================================================
  # BACKUP AUTOMÃTICO
  # ============================================================
  backup:
    <<: *production_env
    image: postgres:16-alpine
    container_name: hotel_backup_prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: hotel_cabo_frio_prod
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_HOST: postgres
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
    volumes:
      - ./backup:/backup
      - ./scripts/backup.sh:/backup.sh:ro
    networks:
      - hotel_network
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "
        while true; do
          echo '[BACKUP] Iniciando backup agendado...' &&
          sh /backup.sh &&
          echo '[BACKUP] Backup concluÃ­do. PrÃ³ximo em 24h.' &&
          sleep 86400
        done
      "
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

# ============================================================
# NETWORKS
# ============================================================
networks:
  hotel_network:
    driver: bridge

# ============================================================
# VOLUMES
# ============================================================
volumes:
  postgres_data_prod:
    driver: local
  redis_data_prod:
    driver: local
  backend_cache_prod:
    driver: local




